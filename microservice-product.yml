spring:
  application:
    name: microservice-product

  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:3306/product_db"
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: 0

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
